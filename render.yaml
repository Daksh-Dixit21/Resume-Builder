services:
  - type: web
    name: resume-server
    env: docker
    region: ohio
    plan: free
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false
      - key: OPENAI_API_KEY
        sync: false

staticSites:
  - name: resume-client
    buildCommand: npm install && npm run build
    publishPath: ./dist
    rootDir: client
    envVars:
      - key: VITE_BASE_URL
        fromService:
          type: web
          name: resume-server
          property: url
